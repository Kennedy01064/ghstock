name: CI - Production Readiness

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    env:
      ENVIRONMENT: testing
      SECRET_KEY: ci-test-secret-key-32-characters-min
      DATABASE_URL: sqlite:///./ci_test.db
      REDIS_URL: redis://localhost:6379/0
      BACKEND_CORS_ORIGINS: "http://localhost:5173,http://localhost:8000"
      VITE_API_BASE_URL: "http://localhost:8000/api/v1"
      PLAYWRIGHT_BASE_URL: "http://localhost:5173"

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python 3.11
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Install Backend Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r backend/requirements.txt
        pip install uvicorn gunicorn

    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: frontend-spa/package-lock.json

    - name: Install Frontend Dependencies
      run: |
        cd frontend-spa
        npm install

    - name: Frontend Build
      run: |
        cd frontend-spa
        npm run build

    - name: Prepare Database
      run: |
        alembic upgrade head
        python backend/scripts/ci_seed.py

    - name: Start Backend
      run: |
        python -m uvicorn backend.main:app --host 0.0.0.0 --port 8000 &
        echo "Waiting for backend health check..."
        timeout 60s bash -c 'until curl -s http://localhost:8000/health; do sleep 2; done'
        echo "Backend is UP"

    - name: Install Playwright Browsers
      run: |
        cd frontend-spa
        npx playwright install --with-deps

    - name: Run Playwright Tests (Smoke & Auth)
      run: |
        cd frontend-spa
        # Agregamos auth.setup.js para que el storageState y el archivo user.json se creen correctamente
        npx playwright test tests/auth.setup.js tests/smoke.spec.js tests/auth.spec.js

    - name: Upload Test Results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: playwright-report
        path: frontend-spa/playwright-report/
        retention-days: 30

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Stock Control | Iniciar Sesión</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-[#00205B] flex items-center justify-center px-4 py-8">

    <div class="w-full max-w-sm">

        <!-- Logo / Brand -->
        <div class="text-center mb-6">
            <img src="/static/img/logo_trans.png" alt="Grupo Hernández" class="h-20 mx-auto object-contain mb-3 drop-shadow-md">
            <h1 class="text-3xl font-sans font-extrabold text-white tracking-widest uppercase leading-tight">Grupo Hernández</h1>
            <p class="text-indigo-200 text-sm mt-1 font-medium">Panel de Control de Inventario</p>
        </div>

        <!-- Login Card -->
        <div class="bg-white rounded-3xl shadow-2xl overflow-hidden">

            <!-- Card Header -->
            <div class="px-8 pt-8 pb-2 text-center">
                <h2 class="text-2xl font-extrabold text-gray-900">Bienvenido</h2>
                <p class="text-sm text-gray-500 mt-1">Ingresa tus credenciales para continuar</p>
            </div>

            <!-- Flash Messages (SweetAlert2 Toasts) -->
            <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
            
            
            <script>
                const Toast = Swal.mixin({
                    toast: true,
                    position: 'top-end',
                    showConfirmButton: false,
                    timer: 4000,
                    timerProgressBar: true,
                    didOpen: (toast) => {
                        toast.addEventListener('mouseenter', Swal.stopTimer)
                        toast.addEventListener('mouseleave', Swal.resumeTimer)
                    }
                });

                
                    
                     
                    
                    Toast.fire({
                        icon: 'info',
                        title: 'Por favor inicia sesión para acceder a esta página.'
                    });
                
            </script>
            
            

            <!-- Form -->
            <form method="POST" action="/auth/login" class="px-8 py-6 space-y-5">

                <!-- Username -->
                <div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
                            </svg>
                        </div>
                        <input type="text" id="username" name="username" required autocomplete="username"
                               placeholder="Usuario"
                               class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-gray-200 text-sm font-bold text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all bg-gray-50 focus:bg-white">
                    </div>
                </div>

                <!-- Password -->
                <div>
                    <div class="relative">
                        <div class="absolute inset-y-0 left-0 pl-4 flex items-center pointer-events-none">
                            <svg class="w-5 h-5 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path>
                            </svg>
                        </div>
                        <input type="password" id="password" name="password" required autocomplete="current-password"
                               placeholder="Contraseña"
                               class="w-full pl-11 pr-4 py-3.5 rounded-xl border border-gray-200 text-sm font-bold text-gray-800 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-400 focus:border-transparent transition-all bg-gray-50 focus:bg-white">
                    </div>
                </div>

                <!-- Remember me -->
                <div class="flex items-center justify-between">
                    <div class="flex items-center">
                        <input id="remember" name="remember" type="checkbox"
                               class="w-4 h-4 text-indigo-600 border-gray-300 rounded focus:ring-indigo-500">
                        <label for="remember" class="ml-2 text-sm text-gray-600 font-medium">Recordar sesión</label>
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                        class="w-full py-4 px-4 rounded-xl text-sm font-extrabold text-[#00205B] bg-[#FAAC2A] hover:bg-[#E5981D] shadow-lg shadow-yellow-500/20 active:scale-[.98] transition-all focus:outline-none focus:ring-4 focus:ring-[#FAAC2A]/50 mt-2">
                    Entrar al Sistema
                </button>
            </form>

            <!-- Footer hint -->
            <div class="px-8 pb-6 text-center">
                <p class="text-xs text-gray-400 font-medium">Acceso restringido. Solo personal autorizado.</p>
            </div>
        </div>

        <!-- Version -->
        <p class="text-center text-white/40 text-xs mt-6">Stock Control &copy; 2026</p>
    </div>

</body>
</html>
